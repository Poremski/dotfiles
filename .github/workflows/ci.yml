name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  flake-check:
    runs-on: self-hosted

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Run flake check
        run: nix flake check
