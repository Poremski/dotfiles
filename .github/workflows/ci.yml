name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  flake-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Run flake check
        run: nix flake check
